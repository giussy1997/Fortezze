<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d14">
<title>Fortress Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d14;
  --bg2: #13131f;
  --bg3: #1a1a2a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8e4d8;
  --text2: #9996a0;
  --text3: #5a5768;
  --ice:  #7ec8e3; --ice-dim:  rgba(126,200,227,0.15); --ice-glow:  rgba(126,200,227,0.4);
  --sand: #e8b86d; --sand-dim: rgba(232,184,109,0.15); --sand-glow: rgba(232,184,109,0.4);
  --peak: #b898e8; --peak-dim: rgba(184,152,232,0.15); --peak-glow: rgba(184,152,232,0.4);
  --danger: #e87070;
  --success: #70c98e;
  --mono: 'Rajdhani', sans-serif;
  --display: 'Cinzel', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
}

/* ── LAYOUT ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

/* ── TOP BAR ── */
.topbar {
  flex-shrink: 0;
  padding: 0.85rem 1.1rem 0;
  background: var(--bg);
}
.topbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar h1 {
  font-family: var(--display);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text);
}
.total-pill {
  font-size: 11px;
  color: var(--text3);
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 3px 10px;
  letter-spacing: 0.06em;
}
.total-pill b { color: var(--text2); }

/* ── TAB BAR ── */
.tabbar {
  flex-shrink: 0;
  display: flex;
  gap: 0;
  margin: 0.75rem 1.1rem 0;
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  flex: 1;
  padding: 0.55rem 0.25rem;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: opacity 0.15s;
  margin-bottom: -1px;
}
.tab-icon { font-size: 18px; line-height: 1; }
.tab-label {
  font-family: var(--display);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  transition: color 0.15s;
}
.tab-count {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 8px;
  letter-spacing: 0.04em;
  opacity: 0.7;
}

.tab-btn[data-world="ghiacci"].active .tab-label { color: var(--ice); }
.tab-btn[data-world="ghiacci"].active { border-bottom-color: var(--ice); }
.tab-btn[data-world="ghiacci"] .tab-count { background: var(--ice-dim); color: var(--ice); }

.tab-btn[data-world="sabbie"].active .tab-label { color: var(--sand); }
.tab-btn[data-world="sabbie"].active { border-bottom-color: var(--sand); }
.tab-btn[data-world="sabbie"] .tab-count { background: var(--sand-dim); color: var(--sand); }

.tab-btn[data-world="vette"].active .tab-label { color: var(--peak); }
.tab-btn[data-world="vette"].active { border-bottom-color: var(--peak); }
.tab-btn[data-world="vette"] .tab-count { background: var(--peak-dim); color: var(--peak); }

/* ── PANELS CONTAINER ── */
.panels-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.panels-slider {
  display: flex;
  height: 100%;
  width: 300%;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.panel {
  width: calc(100% / 3);
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0.75rem 1rem 1.5rem;
  -webkit-overflow-scrolling: touch;
}

.data-btns {
  display: flex;
  gap: 7px;
  margin-top: 10px;
}
.btn-data {
  flex: 1;
  height: 34px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text2);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn-data:active { background: var(--border2); }
.btn-export:hover { border-color: rgba(126,200,227,0.5); color: var(--ice); }
.btn-import:hover { border-color: rgba(232,184,109,0.5); color: var(--sand); }
.toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 8px 18px;
  font-size: 12px;
  letter-spacing: 0.07em;
  color: var(--text2);
  z-index: 300;
  animation: toastin 0.2s ease, toastout 0.3s ease 1.7s forwards;
  white-space: nowrap;
}
.toast.ok  { color: var(--success); border-color: rgba(112,201,142,0.4); }
.toast.err { color: var(--danger);  border-color: rgba(232,112,112,0.4); }
@keyframes toastin  { from { opacity:0; transform:translateX(-50%) translateY(8px) } to { opacity:1; transform:translateX(-50%) translateY(0) } }
@keyframes toastout { from { opacity:1 } to { opacity:0 } }
/* scrollbar */
.panel::-webkit-scrollbar { width: 3px; }
.panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── WORLD HEADER inside panel ── */
.world-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 0.9rem;
  padding: 0 0.1rem;
}
.world-icon {
  width: 36px; height: 36px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.ghiacci .world-icon { background: var(--ice-dim);  border: 1px solid var(--ice-glow); }
.sabbie  .world-icon { background: var(--sand-dim); border: 1px solid var(--sand-glow); }
.vette   .world-icon { background: var(--peak-dim); border: 1px solid var(--peak-glow); }
.world-heading-title {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.17em;
  text-transform: uppercase;
}
.ghiacci .world-heading-title { color: var(--ice); }
.sabbie  .world-heading-title { color: var(--sand); }
.vette   .world-heading-title { color: var(--peak); }

/* ── FORTRESS LIST ── */
.fort-list { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 0.85rem; }

.fort-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 8px;
  align-items: center;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.65rem 0.8rem;
}
.fort-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 130px;
  letter-spacing: 0.04em;
}
.fort-coords {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.06em;
  margin-top: 2px;
}
.timer-block { text-align: right; }
.timer-val {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.tv-run  { color: var(--success); }
.tv-exp  { color: var(--danger); }
.tv-none { color: var(--text3); }
.timer-sub { font-size: 10px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 1px; }

.row-btns { display: flex; gap: 5px; }
.btn-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.btn-icon:active { background: var(--border2); }

/* ── ADD FORM ── */
.add-form {
  background: var(--bg2);
  border: 1px dashed var(--border2);
  border-radius: 10px;
  padding: 0.85rem;
}
.add-form-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.13em;
  color: var(--text3);
  margin-bottom: 0.6rem;
  font-weight: 600;
}
.input-row { display: flex; gap: 7px; margin-bottom: 7px; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); }
.field input {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  padding: 5px 9px;
  height: 36px;
  outline: none;
  width: 100%;
  -webkit-appearance: none;
  transition: border-color 0.15s;
}
.field input:focus { border-color: rgba(255,255,255,0.3); }
.field input.err { border-color: var(--danger); }
.field input::placeholder { color: var(--text3); }
.f-name { flex: 2; min-width: 90px; }
.f-coord { flex: 1; min-width: 52px; }
.f-timer-sm { flex: 1; min-width: 44px; }

.timer-label-row {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin-bottom: 5px;
}
.timer-inputs { display: flex; gap: 7px; margin-bottom: 0.6rem; }

.btn-add {
  width: 100%;
  height: 38px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--display);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-add:active { background: var(--border2); }

.empty-msg {
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  padding: 1.5rem 0 0.5rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px 16px 0 0;
  padding: 1.25rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 600px;
  animation: slideup 0.2s ease;
}
@keyframes slideup { from { transform: translateY(40px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
.modal-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 1rem; }
.modal h3 { font-family: var(--display); font-size: 13px; letter-spacing: 0.13em; text-transform: uppercase; margin-bottom: 0.2rem; }
.modal-sub { font-size: 12px; color: var(--text3); margin-bottom: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.modal-timer-row { display: flex; gap: 8px; margin-bottom: 0.4rem; }
.modal-hint { font-size: 11px; color: var(--text3); letter-spacing: 0.04em; margin-bottom: 1rem; }
.modal-actions { display: flex; gap: 8px; }
.btn-cancel {
  flex: 1; height: 44px;
  background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px;
  color: var(--text2); font-family: var(--mono); font-size: 14px; letter-spacing: 0.06em;
  cursor: pointer; text-transform: uppercase;
}
.btn-confirm {
  flex: 2; height: 44px;
  background: rgba(112,201,142,0.15); border: 1px solid rgba(112,201,142,0.4); border-radius: 10px;
  color: var(--success); font-family: var(--display); font-size: 12px; letter-spacing: 0.12em;
  cursor: pointer; text-transform: uppercase;
}
.btn-confirm:active { background: rgba(112,201,142,0.25); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-row">
      <h1>⚔ Fortress Tracker</h1>
      <div class="total-pill">Totale: <b id="total-count">0</b></div>
    </div>
    <div class="data-btns">
      <button class="btn-data btn-export" onclick="exportJSON()">⬇ Esporta JSON</button>
      <button class="btn-data btn-import" onclick="document.getElementById('import-input').click()">⬆ Importa JSON</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
    <button id="notif-btn" class="btn-data" onclick="toggleNotif()" style="margin-top:6px;width:100%;height:34px;font-size:11px;">🔔 Abilita notifiche</button>
    <div class="tabbar" id="tabbar"></div>
  </div>

  <div class="panels-wrap">
    <div class="panels-slider" id="slider"></div>
  </div>
</div>
<div id="modal-root"></div>

<script>
const WORLDS = [
  { id: 'ghiacci', name: 'GHIACCI', icon: '❄', cls: 'ghiacci' },
  { id: 'sabbie',  name: 'SABBIE',  icon: '🏜', cls: 'sabbie'  },
  { id: 'vette',   name: 'VETTE',   icon: '⛰', cls: 'vette'   }
];

let data = { ghiacci: [], sabbie: [], vette: [] };
let activeIdx = 0;

function load() {
  try { const s = localStorage.getItem('ft_v4'); if (s) data = JSON.parse(s); } catch(e) {}
}
function save() {
  try { localStorage.setItem('ft_v4', JSON.stringify(data)); } catch(e) {}
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtMs(ms) {
  if (ms <= 0) return { str: 'SCADUTO', cls: 'tv-exp', sub: 'scaduto' };
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sc = s % 60;
  let str = '';
  if (d > 0) str += d + 'g ';
  if (d > 0 || h > 0) str += h + 'h ';
  str += String(m).padStart(2,'0') + ':' + String(sc).padStart(2,'0');
  return { str: str.trim(), cls: 'tv-run', sub: 'restante' };
}

function updateTotal() {
  const tot = WORLDS.reduce((a, w) => a + (data[w.id]||[]).length, 0);
  document.getElementById('total-count').textContent = tot;
  WORLDS.forEach(w => {
    const el = document.getElementById('tc-' + w.id);
    if (el) el.textContent = (data[w.id]||[]).length;
  });
}

function renderList(wid) {
  const list = document.getElementById('list-' + wid);
  if (!list) return;
  const forts = data[wid] || [];
  list.innerHTML = '';
  if (forts.length === 0) {
    list.innerHTML = '<div class="empty-msg">Nessuna fortezza</div>';
    updateTotal();
    return;
  }
  forts.forEach((f, i) => {
    const ms = f.timerEnd ? f.timerEnd - Date.now() : null;
    let timerHTML;
    if (ms === null) {
      timerHTML = `<div class="timer-val tv-none">—</div><div class="timer-sub">nessun timer</div>`;
    } else {
      const { str, cls, sub } = fmtMs(ms);
      timerHTML = `<div class="timer-val ${cls}" id="tv-${wid}-${i}">${str}</div><div class="timer-sub" id="ts-${wid}-${i}">${sub}</div>`;
    }
    const row = document.createElement('div');
    row.className = 'fort-row';
    row.innerHTML = `
      <div>
        <div class="fort-name" title="${esc(f.name)}">${esc(f.name||'Fortezza')}</div>
        <div class="fort-coords">X: ${esc(f.x)} / Y: ${esc(f.y)}</div>
      </div>
      <div class="timer-block">${timerHTML}</div>
      <div class="row-btns">
        <button class="btn-icon" title="Timer" onclick="openModal('${wid}',${i})">⏱</button>
        <button class="btn-icon" title="Elimina" onclick="delFort('${wid}',${i})">✕</button>
      </div>`;
    list.appendChild(row);
  });
  updateTotal();
}

function addFort(wid) {
  const n = document.getElementById('f-name-'+wid);
  const x = document.getElementById('f-x-'+wid);
  const y = document.getElementById('f-y-'+wid);
  const d = document.getElementById('f-d-'+wid);
  const h = document.getElementById('f-h-'+wid);
  const m = document.getElementById('f-m-'+wid);
  let ok = true;
  [x, y].forEach(el => { el.classList.remove('err'); if (!el.value.trim()) { el.classList.add('err'); ok = false; } });
  if (!ok) return;
  const totalMs = ((parseInt(d.value)||0)*86400 + (parseInt(h.value)||0)*3600 + (parseInt(m.value)||0)*60) * 1000;
  data[wid].push({ name: n.value.trim()||'Fortezza', x: x.value.trim(), y: y.value.trim(), timerEnd: totalMs > 0 ? Date.now() + totalMs : null, created: Date.now() });
  save();
  n.value=''; x.value=''; y.value=''; d.value=''; h.value=''; m.value='';
  renderList(wid);
}

function delFort(wid, idx) {
  data[wid].splice(idx, 1);
  save();
  renderList(wid);
}

function openModal(wid, idx) {
  const f = data[wid][idx];
  document.getElementById('modal-root').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3>Imposta timer</h3>
      <div class="modal-sub">${esc(f.name||'Fortezza')} — X:${esc(f.x)} Y:${esc(f.y)}</div>
      <div class="modal-timer-row">
        <div class="field f-timer-sm"><label>Giorni</label><input id="md" type="number" min="0" placeholder="0" inputmode="numeric"></div>
        <div class="field f-timer-sm"><label>Ore</label><input id="mh" type="number" min="0" max="23" placeholder="0" inputmode="numeric"></div>
        <div class="field f-timer-sm"><label>Minuti</label><input id="mm" type="number" min="0" max="59" placeholder="0" inputmode="numeric"></div>
      </div>
      <div class="modal-hint">Lascia tutto a 0 per rimuovere il timer</div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Annulla</button>
        <button class="btn-confirm" onclick="applyTimer('${wid}',${idx})">Applica</button>
      </div>
    </div>
  </div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
function applyTimer(wid, idx) {
  const totalMs = ((parseInt(document.getElementById('md').value)||0)*86400 + (parseInt(document.getElementById('mh').value)||0)*3600 + (parseInt(document.getElementById('mm').value)||0)*60) * 1000;
  data[wid][idx].timerEnd = totalMs > 0 ? Date.now() + totalMs : null;
  save(); closeModal(); renderList(wid);
}

function exportJSON() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href     = url;
  a.download = `fortress_tracker_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ File esportato', 'ok');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error();
      const validKeys = ['ghiacci','sabbie','vette'];
      const hasAny = validKeys.some(k => Array.isArray(parsed[k]));
      if (!hasAny) throw new Error();
      validKeys.forEach(k => { if (!Array.isArray(parsed[k])) parsed[k] = []; });
      data = parsed;
      save();
      WORLDS.forEach(w => renderList(w.id));
      showToast('✓ Dati importati', 'ok');
    } catch(err) {
      showToast('✗ File non valido', 'err');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function showToast(msg, type) {
  const old = document.getElementById('toast-el');
  if (old) old.remove();
  const t = document.createElement('div');
  t.id = 'toast-el';
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { if (t.parentNode) t.remove(); }, 2100);
}

/* ── TAB SWITCHING ── */
function switchTab(idx) {
  activeIdx = idx;
  document.getElementById('slider').style.transform = `translateX(calc(-${idx * 100/3}%))`;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
}

/* ── SWIPE ── */
let touchStartX = 0, touchStartY = 0, swiping = false;
function initSwipe() {
  const wrap = document.querySelector('.panels-wrap');
  wrap.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    swiping = false;
  }, { passive: true });
  wrap.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) swiping = true;
  }, { passive: true });
  wrap.addEventListener('touchend', e => {
    if (!swiping) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (dx < -40 && activeIdx < 2) switchTab(activeIdx + 1);
    else if (dx > 40 && activeIdx > 0) switchTab(activeIdx - 1);
  }, { passive: true });
}

/* ── BUILD UI ── */
function buildUI() {
  const tabbar = document.getElementById('tabbar');
  const slider = document.getElementById('slider');
  tabbar.innerHTML = '';
  slider.innerHTML = '';

  WORLDS.forEach((w, i) => {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.dataset.world = w.id;
    btn.onclick = () => switchTab(i);
    btn.innerHTML = `
      <span class="tab-icon">${w.icon}</span>
      <span class="tab-label">${w.name}</span>
      <span class="tab-count" id="tc-${w.id}">0</span>`;
    tabbar.appendChild(btn);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'panel ' + w.cls;
    panel.id = 'panel-' + w.id;
    panel.innerHTML = `
      <div class="world-heading">
        <div class="world-icon">${w.icon}</div>
        <div class="world-heading-title">${w.name}</div>
      </div>
      <div class="fort-list" id="list-${w.id}"></div>
      <div class="add-form">
        <div class="add-form-title">+ Nuova fortezza</div>
        <div class="input-row">
          <div class="field f-name"><label>Nome</label><input id="f-name-${w.id}" type="text" placeholder="opzionale"></div>
          <div class="field f-coord"><label>X</label><input id="f-x-${w.id}" type="text" placeholder="000" inputmode="decimal"></div>
          <div class="field f-coord"><label>Y</label><input id="f-y-${w.id}" type="text" placeholder="000" inputmode="decimal"></div>
        </div>
        <div class="timer-label-row">Timer (opzionale)</div>
        <div class="timer-inputs">
          <div class="field f-timer-sm"><label>Giorni</label><input id="f-d-${w.id}" type="number" min="0" placeholder="0" inputmode="numeric"></div>
          <div class="field f-timer-sm"><label>Ore</label><input id="f-h-${w.id}" type="number" min="0" max="23" placeholder="0" inputmode="numeric"></div>
          <div class="field f-timer-sm"><label>Min</label><input id="f-m-${w.id}" type="number" min="0" max="59" placeholder="0" inputmode="numeric"></div>
        </div>
        <button class="btn-add" onclick="addFort('${w.id}')">＋ Aggiungi</button>
      </div>`;
    slider.appendChild(panel);
    renderList(w.id);
  });

  initSwipe();
}

function tick() {
  WORLDS.forEach(w => {
    (data[w.id]||[]).forEach((f, i) => {
      if (!f.timerEnd) return;
      const el  = document.getElementById('tv-' + w.id + '-' + i);
      const sub = document.getElementById('ts-' + w.id + '-' + i);
      if (!el) return;
      const { str, cls, sub: subTxt } = fmtMs(f.timerEnd - Date.now());
      el.textContent = str;
      el.className = 'timer-val ' + cls;
      if (sub) sub.textContent = subTxt;
    });
  });
  checkNotifs();
}

/* ── NOTIFICHE ── */
const fired = {};
function notifKey(wid, i, type) { return `${wid}-${i}-${type}`; }

async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const result = await Notification.requestPermission();
  return result === 'granted';
}

function sendNotif(title, body) {
  if (Notification.permission !== 'granted') return;
  try { new Notification(title, { body, silent: false }); } catch(e) {}
}

function checkNotifs() {
  if (Notification.permission !== 'granted') return;
  const now = Date.now();
  WORLDS.forEach(w => {
    (data[w.id] || []).forEach((f, i) => {
      if (!f.timerEnd) return;
      const ms = f.timerEnd - now;
      const name = f.name || 'Fortezza';

      const kStamp = notifKey(w.id, i, 'stamp');
      if (fired[kStamp] !== f.timerEnd) {
        fired[kStamp] = f.timerEnd;
        delete fired[notifKey(w.id, i, '10m')];
        delete fired[notifKey(w.id, i, 'exp')];
      }

      const k10 = notifKey(w.id, i, '10m');
      if (!fired[k10] && ms > 0 && ms <= 15 * 60 * 1000) {
        fired[k10] = true;
        const min = Math.ceil(ms / 60000);
        sendNotif(`⚔ ${name} — ${w.name}`, `Il timer scade tra circa ${min} minut${min === 1 ? 'o' : 'i'}!`);
      }
    });
  });
}

function updateNotifBtn() {
  const btn = document.getElementById('notif-btn');
  if (!btn) return;
  if (!('Notification' in window)) {
    btn.textContent = '🔕 Notifiche non supportate';
    btn.disabled = true; btn.style.opacity = '0.4'; btn.style.cursor = 'default';
  } else if (Notification.permission === 'granted') {
    btn.textContent = '🔔 Notifiche attive';
    btn.style.color = 'var(--success)'; btn.style.borderColor = 'rgba(112,201,142,0.4)';
    btn.disabled = true; btn.style.cursor = 'default';
  } else if (Notification.permission === 'denied') {
    btn.textContent = '🔕 Notifiche bloccate — abilitale nelle impostazioni del browser';
    btn.style.color = 'var(--danger)'; btn.style.borderColor = 'rgba(232,112,112,0.4)';
    btn.disabled = true; btn.style.cursor = 'default';
  } else {
    btn.textContent = '🔔 Tocca per abilitare le notifiche';
    btn.style.color = 'var(--sand)'; btn.style.borderColor = 'var(--sand-glow)';
    btn.disabled = false; btn.style.cursor = 'pointer';
  }
}

async function toggleNotif() {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'default') return;
  await Notification.requestPermission();
  updateNotifBtn();
}

async function initNotifs() {
  updateNotifBtn();
}

load();
buildUI();
initNotifs();
setInterval(tick, 1000);
</script>
</body>
